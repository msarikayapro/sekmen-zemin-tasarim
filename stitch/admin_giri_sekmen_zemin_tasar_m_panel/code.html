            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.2), transparent);
            transition: 0.5s;
        }

        .btn-sweep:hover::after {

<body class="flex items-center justify-center min-h-screen pavement-pattern">
<!-- Atmospheric Background Element -->
<div class="fixed inset-0 pointer-events-none overflow-hidden">
<div class="absolute -top-1/4 -right-1/4 w-[600px] h-[600px] bg-gold-dark/5 blur-[120px] rounded-full"></div>
<div class="absolute -bottom-1/4 -left-1/4 w-[600px] h-[600px] bg-gold-dark/5 blur-[120px] rounded-full"></div>
</div>
<main class="relative z-10 w-full max-w-[440px] px-margin-mobile md:px-0">
<!-- Login Card -->
<div class="glass-card gold-glow rounded-xl p-8 md:p-10 flex flex-col items-center">
<!-- Brand Identity -->
<div class="mb-10 text-center">
<div class="w-20 h-20 mx-auto mb-6 flex items-center justify-center rounded-full bg-primary-container border border-gold-dark/30">
<span class="material-symbols-outlined text-tertiary text-4xl" data-icon="architecture" style="font-variation-settings: 'FILL' 0;">architecture</span>
</div>
<h1 class="font-headline-md text-headline-md text-tertiary tracking-tight mb-2">Sekmen Zemin</h1>
<p class="font-label-caps text-label-caps text-stone-grey uppercase">Yönetim Paneli</p>
</div>
<!-- Login Form -->
<form action="#" class="w-full space-y-6" onsubmit="return false">
<!-- Email Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-stone-grey ml-1" for="email">E-posta</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-stone-grey text-xl" data-icon="mail">mail</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3.5 pl-12 pr-4 font-body-md text-body-md text-on-surface focus:outline-none input-focus-gold transition-all" id="email" placeholder="admin@sekmenzemin.com" required="" type="email"/>
</div>
</div>
<!-- Password Field -->
<div class="space-y-2">
<label class="font-label-caps text-label-caps text-stone-grey ml-1" for="password">Şifre</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-stone-grey text-xl" data-icon="lock">lock</span>
<input class="w-full bg-surface-container-lowest border border-outline-variant rounded-lg py-3.5 pl-12 pr-12 font-body-md text-body-md text-on-surface focus:outline-none input-focus-gold transition-all" id="password" placeholder="••••••••" required="" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-stone-grey hover:text-tertiary transition-colors" type="button">
<span class="material-symbols-outlined text-xl" data-icon="visibility">visibility</span>
</button>
</div>
</div>
<!-- Remember & Forgot -->
<div class="flex items-center justify-between text-body-md">
<label class="flex items-center gap-2 cursor-pointer group">
<div class="relative w-5 h-5 flex items-center justify-center">
<input class="peer hidden" id="remember" type="checkbox"/>
<div class="w-full h-full border border-outline-variant rounded bg-surface-container-lowest peer-checked:bg-gold-dark peer-checked:border-gold-dark transition-all"></div>
<span class="material-symbols-outlined text-coal absolute opacity-0 peer-checked:opacity-100 text-sm font-bold" data-icon="check">check</span>
</div>
<span class="font-body-md text-stone-grey group-hover:text-on-surface transition-colors select-none">Beni Hatırla</span>
</label>
<a class="font-body-md text-tertiary hover:text-gold-light transition-colors font-medium" href="#">Şifremi Unuttum</a>
</div>
<!-- Submit Button -->
<button class="btn-sweep w-full bg-gold-dark hover:bg-gold-light text-primary-container font-headline-md text-body-md font-bold py-4 rounded-lg shadow-lg shadow-gold-dark/20 uppercase tracking-widest mt-4" type="submit">
                    Giriş Yap
                </button>
</form>
<!-- Footer Links -->
<div class="mt-10 pt-6 border-t border-outline-variant/30 w-full text-center">
<p class="font-label-caps text-label-caps text-stone-grey/60 mb-2">

                </p>
<div class="flex justify-center gap-4">
<a class="font-label-caps text-[10px] text-stone-grey hover:text-tertiary transition-colors" href="#">YARDIM</a>
<span class="text-stone-grey/30">•</span>
<a class="font-label-caps text-[10px] text-stone-grey hover:text-tertiary transition-colors" href="#">GİZLİLİK</a>

</div>

<div class="w-1.5 h-1.5 rounded-full bg-green-500 animate-pulse"></div>
<span class="font-label-caps text-[10px] text-stone-grey uppercase tracking-tighter">Sistem Durumu: Güvenli</span>
</div>
</main>
<!-- Custom Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const inputs = document.querySelectorAll('input');
            const submitBtn = document.querySelector('button[type="submit"]');

            inputs.forEach(input => {
                input.addEventListener('focus', () => {
                    input.parentElement.parentElement.querySelector('label').classList.replace('text-stone-grey', 'text-tertiary');
                });
                input.addEventListener('blur', () => {
                    input.parentElement.parentElement.querySelector('label').classList.replace('text-tertiary', 'text-stone-grey');
                });
            });

            // Simulated login feedback
            submitBtn.addEventListener('click', (e) => {
                const btn = e.target;
                const originalText = btn.innerText;
                btn.innerText = 'Kontrol Ediliyor...';
                btn.style.opacity = '0.8';
                btn.disabled = true;

                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.opacity = '1';
                    btn.disabled = false;
                }, 2000);
            });
        });
    </script>
</body></html>
