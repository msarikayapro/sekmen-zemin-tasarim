<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="800" height="600" role="img" aria-label="Sekmen Zemin Tasarım görsel">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#201f1f"/>
      <stop offset="1" stop-color="#0e0e0e"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#D4A95C"/>
      <stop offset="1" stop-color="#8C6526"/>
    </linearGradient>
    <pattern id="pav" width="80" height="46" patternUnits="userSpaceOnUse" patternTransform="rotate(0)">
      <path d="M0 0 L40 23 L0 46 Z M40 23 L80 0 L80 46 Z" fill="none" stroke="#8C6526" stroke-opacity="0.10" stroke-width="1.2"/>
    </pattern>
  </defs>
  <rect width="800" height="600" fill="url(#bg)"/>
  <rect width="800" height="600" fill="url(#pav)"/>
  <g transform="translate(400 270)">
    <rect x="-46" y="-46" width="92" height="92" rx="14" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <path d="M-26 16 L0 -24 L26 16 Z" fill="none" stroke="url(#gold)" stroke-width="2.5" stroke-linejoin="round"/>
    <circle cx="0" cy="-2" r="5" fill="url(#gold)"/>
  </g>
  <text x="400" y="390" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="26" letter-spacing="3" fill="#F5F2EC" font-weight="700">SEKMEN ZEMİN</text>
  <text x="400" y="420" text-anchor="middle" font-family="Montserrat, Arial, sans-serif" font-size="13" letter-spacing="6" fill="#8A8A8A">TASARIM</text>
</svg>
